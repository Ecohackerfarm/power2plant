name: Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-dev:
    name: Dev Build
    if: startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: power2plant
          POSTGRES_PASSWORD: power2plant
          POSTGRES_DB: power2plant
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://power2plant:power2plant@localhost:5432/power2plant
      BETTER_AUTH_SECRET: ci-build-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma generate

      - name: Run migrations
        run: pnpm exec prisma migrate deploy || echo '[dev] migration failed — fix then run prisma migrate deploy manually'

      - name: Start dev server
        run: pnpm dev &

      - name: Wait for dev server
        run: timeout 120 sh -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'

  build-prod:
    name: Production Build
    if: startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://power2plant:power2plant@localhost:5432/power2plant
      BETTER_AUTH_SECRET: ci-build-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma generate

      - name: Production build
        run: pnpm build
