name: E2E Tests

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: power2plant
          POSTGRES_PASSWORD: power2plant
          POSTGRES_DB: power2plant
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://power2plant:power2plant@localhost:5432/power2plant
      BETTER_AUTH_SECRET: ci-test-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma generate

      - name: Restore database
        run: psql "$DATABASE_URL" < db/seed.sql

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build app
        run: pnpm build

      - name: Start app
        run: pnpm start &

      - name: Wait for app
        run: timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'

      - name: Run E2E tests
        run: pnpm test:e2e
