services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: power2plant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-power2plant}
      POSTGRES_DB: power2plant
    ports:
      - "5432:5432"
    volumes:
      - ${VOLUME_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U power2plant"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://power2plant:power2plant@db:5432/power2plant}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

volumes: {}
