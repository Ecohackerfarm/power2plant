services:
  webhook:
    image: almir/webhook
    container_name: power2plant-webhook
    restart: unless-stopped
    ports:
      - "[::]:9000:9000"
    volumes:
      - ./hooks.json:/etc/webhook/hooks.json:ro
      - /run:/run
    command: -verbose -hooks /etc/webhook/hooks.json -hotreload
    # No Docker socket. No SSH keys. No prod volume.
    # hooks.json is generated by scripts/server/setup.sh — never committed (gitignored).
