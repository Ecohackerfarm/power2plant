services:
  app:
    build:
      context: .
      target: deps
      args:
        FROZEN_LOCKFILE: "false"
    command: sh -c "ssh-keygen -A && /usr/sbin/sshd && pnpm exec prisma generate && { pnpm exec prisma migrate deploy || echo '[dev] migration failed — fix then run prisma migrate deploy manually'; } && pnpm dev"
    ports: !override
      - "3000:3000"
      - "5555:5555"
      - "2222:2222"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://power2plant:power2plant@db:5432/power2plant
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      default: {}
      power2plant-dev:
        aliases:
          - app-dev
  db:
    networks:
      default: {}
      power2plant-dev:
        aliases:
          - db-dev

networks:
  power2plant-dev:
    external: true
