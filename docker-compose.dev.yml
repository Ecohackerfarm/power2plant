services:
  app:
    build:
      context: .
      target: deps
    command: sh -c "pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm dev"
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://power2plant:power2plant@db:5432/power2plant
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - development-network

networks:
  development-network:
    external: true
